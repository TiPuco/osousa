{{- define "main" }}

<div class="post-single">
  <header class="post-header">
    {{- partial "breadcrumbs.html" . }}
    <h1 class="post-title"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#E8A020" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:8px"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>Contact</h1>
    <p>Fill in the form below and I'll get back to you as soon as possible.</p>
  </header>

  <div id="msg-success" style="display:none; padding: 1rem; background: #d4edda; border-radius: 8px; margin-bottom: 1.5rem; color: #155724;">
    ✅ Message sent successfully. I'll get back to you soon.
  </div>

  <div id="msg-error" style="display:none; padding: 1rem; background: #f8d7da; border-radius: 8px; margin-bottom: 1.5rem; color: #721c24;">
    ❌ Something went wrong. Please try again.
  </div>

  <form action="https://contact-form.osvaldodesousa.workers.dev" method="POST" style="display:flex; flex-direction:column; gap:1rem; max-width:600px;">
    <div>
      <label for="name" style="display:block; margin-bottom:0.3rem; font-weight:500;">Name *</label>
      <input type="text" id="name" name="name" required
        style="width:100%; padding:0.6rem 0.8rem; border:1px solid var(--border); border-radius:6px; background:var(--entry); color:var(--primary); font-size:1rem;">
    </div>
    <div>
      <label for="email" style="display:block; margin-bottom:0.3rem; font-weight:500;">Email *</label>
      <input type="email" id="email" name="email" required
        style="width:100%; padding:0.6rem 0.8rem; border:1px solid var(--border); border-radius:6px; background:var(--entry); color:var(--primary); font-size:1rem;">
    </div>
    <div>
      <label for="subject" style="display:block; margin-bottom:0.3rem; font-weight:500;">Subject</label>
      <input type="text" id="subject" name="subject"
        style="width:100%; padding:0.6rem 0.8rem; border:1px solid var(--border); border-radius:6px; background:var(--entry); color:var(--primary); font-size:1rem;">
    </div>
    <div>
      <label for="message" style="display:block; margin-bottom:0.3rem; font-weight:500;">Message *</label>
      <textarea id="message" name="message" rows="6" required
        style="width:100%; padding:0.6rem 0.8rem; border:1px solid var(--border); border-radius:6px; background:var(--entry); color:var(--primary); font-size:1rem; resize:vertical;"></textarea>
    </div>
    <div>
      <button type="submit"
        style="padding:0.6rem 1.5rem; background:var(--primary); color:var(--theme); border:none; border-radius:6px; font-size:1rem; cursor:pointer;">
        Send Message
      </button>
    </div>
  </form>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  if (params.get("success") === "1") {
    document.getElementById("msg-success").style.display = "block";
  }
  if (params.get("error") === "1") {
    document.getElementById("msg-error").style.display = "block";
  }
</script>
{{- end }}
