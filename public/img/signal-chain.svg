<svg width="680" height="780" viewBox="0 0 680 780" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Hi-Fi signal chain diagram</title>
<desc>Flowchart showing the audio signal path from Roon ROCK source through DAC, preamp, power amp, to speakers and subwoofers</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#9b9c9d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect width="680" height="780" fill="#2e2e33"/>

<g>
<rect x="190" y="20" width="300" height="56" rx="8" fill="#2e2e33" stroke="#41423f" stroke-width="1"/>
<text x="340" y="40" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#dadadb">Roon ROCK</text>
<text x="340" y="58" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#9b9c9d">Intel NUC, music library and DSP</text>
</g>
<line x1="340" y1="76" x2="340" y2="112" stroke="#9b9c9d" stroke-width="1.5" marker-end="url(#arrow)"/>

<text x="340" y="128" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#9b9c9d">either</text>

<g>
<rect x="60" y="140" width="240" height="56" rx="8" fill="#2e2e33" stroke="#41423f" stroke-width="1"/>
<text x="180" y="160" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#dadadb">Mac Studio M1 Ultra</text>
<text x="180" y="178" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#9b9c9d">Roon endpoint, USB out</text>
</g>

<g>
<rect x="380" y="140" width="240" height="56" rx="8" fill="#2e2e33" stroke="#41423f" stroke-width="1"/>
<text x="500" y="160" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#dadadb">Holo Audio RED</text>
<text x="500" y="178" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#9b9c9d">DDC and streamer endpoint</text>
</g>

<path d="M180 196 L180 230 L340 230 L340 250" fill="none" stroke="#9b9c9d" stroke-width="1.5"/>
<path d="M500 196 L500 230 L340 230" fill="none" stroke="#9b9c9d" stroke-width="1.5"/>
<line x1="340" y1="230" x2="340" y2="250" stroke="#9b9c9d" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="190" y="262" width="300" height="56" rx="8" fill="#2e2e33" stroke="#E8A020" stroke-width="1"/>
<text x="340" y="282" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#E8A020">Holo Audio Cyan 2</text>
<text x="340" y="300" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#dcb878">R2R DAC, DSD1024</text>
</g>
<line x1="340" y1="318" x2="340" y2="354" stroke="#9b9c9d" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="170" y="366" width="340" height="56" rx="8" fill="#2e2e33" stroke="#E8A020" stroke-width="1"/>
<text x="340" y="386" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#E8A020">Naim NAC 282</text>
<text x="340" y="404" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#dcb878">Preamplifier</text>
</g>

<g>
<rect x="190" y="478" width="300" height="56" rx="8" fill="#2e2e33" stroke="#41423f" stroke-width="1"/>
<text x="340" y="498" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#dadadb">TeddyCap SE + NAPSC</text>
<text x="340" y="516" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#9b9c9d">Outboard power supply</text>
</g>

<text x="356" y="448" text-anchor="start" font-family="sans-serif" font-size="12" fill="#9b9c9d">powers</text>
<line x1="340" y1="478" x2="340" y2="422" stroke="#9b9c9d" stroke-width="1.5" marker-end="url(#arrow)"/>

<path d="M490 394 L560 394 L560 614 L494 614" fill="none" stroke="#9b9c9d" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="190" y="586" width="300" height="56" rx="8" fill="#2e2e33" stroke="#E8A020" stroke-width="1"/>
<text x="340" y="606" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#E8A020">Naim NAP 250DR</text>
<text x="340" y="624" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#dcb878">Power amplifier</text>
</g>
<text x="356" y="668" text-anchor="start" font-family="sans-serif" font-size="12" fill="#9b9c9d">drives both</text>

<g>
<rect x="60" y="706" width="240" height="56" rx="8" fill="#2e2e33" stroke="#41423f" stroke-width="1"/>
<text x="180" y="726" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#dadadb">Dynaudio Heritage Special</text>
<text x="180" y="744" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#9b9c9d">Bookshelf loudspeakers</text>
</g>

<g>
<rect x="380" y="706" width="240" height="56" rx="8" fill="#2e2e33" stroke="#41423f" stroke-width="1"/>
<text x="500" y="726" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#dadadb">REL S/510 (pair)</text>
<text x="500" y="744" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#9b9c9d">Subwoofers, high-level input</text>
</g>

<path d="M340 642 L340 690 L180 690 L180 704" fill="none" stroke="#9b9c9d" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M340 642 L340 690 L500 690 L500 704" fill="none" stroke="#9b9c9d" stroke-width="1.5" marker-end="url(#arrow)"/>

</svg>
