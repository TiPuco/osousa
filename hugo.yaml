baseURL: "https://osousa.com/"
title: "Osvaldo de Sousa"
paginate: 3
theme: PaperMod
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

markup:
  goldmark:
    renderer:
      unsafe: true

params:
  env: production
  title: "Osvaldo de Sousa"
  description: "Cybersecurity analyst based in Songo. Writing about infosec, networking, hi-fi and all things I find interesting."
  keywords: [cybersecurity, infosec, networking, blog, mozambique]
  author: "Osvaldo de Sousa"
  defaultTheme: dark
  disableThemeToggle: false
  comments: true
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true

  assets:
    favicon: "favicon.svg"
    favicon16x16: "favicon-16x16.png"
    favicon32x32: "favicon-32x32.png"
    apple_touch_icon: "apple-touch-icon.png"
    safari_pinned_tab: "favicon.svg"

  mainSections:
    - posts

  profileMode:
    enabled: true
    title: "Osvaldo de Sousa"
    subtitle: "IT · Music · Hi-Fi · Photography · Lifestyle<br>Based in Mozambique <svg xmlns='http://www.w3.org/2000/svg' width='20' height='13' viewBox='0 0 360 240' style='vertical-align:middle;margin-left:2px'><rect width='360' height='240' fill='#009A44'/><rect y='75' width='360' height='10' fill='#fff'/><rect y='85' width='360' height='70' fill='#000'/><rect y='155' width='360' height='10' fill='#fff'/><rect y='165' width='360' height='75' fill='#FCE100'/><polygon points='0,0 120,120 0,240' fill='#C8102E'/><g transform='translate(37,120)'><polygon points='0,-27 6.3,-8.7 25.7,-8.7 10.2,3.3 15.9,21.6 0,10.5 -15.9,21.6 -10.2,3.3 -25.7,-8.7 -6.3,-8.7' fill='#FCE100'/></g></svg>"
    imageUrl: "img/profile.jpg"
    imageWidth: 240
    imageHeight: 240
    imageTitle: "Osvaldo de Sousa"
    buttons:
      - name: About
        url: /about/
      - name: Blog
        url: /posts/

  socialIcons:
    - name: linkedin
      url: "https://www.linkedin.com/in/osvaldodesousa/"
    - name: github
      url: "https://github.com/TiPuco"
    - name: rss
      url: "/index.xml"

menu:
  main:
    - identifier: about
      name: About
      url: /about/
      weight: 10
    - identifier: blog
      name: Blog
      url: /posts/
      weight: 20
    - identifier: search
      name: Search
      url: /search/
      weight: 30
    - identifier: archives
      name: Archives
      url: /archives/
      weight: 40
    - identifier: hifi
      name: Hi-Fi
      url: /hifi/
      weight: 45
    - identifier: contact
      name: Contact
      url: /contact/
      weight: 50

outputs:
  home:
    - HTML
    - RSS
    - JSON