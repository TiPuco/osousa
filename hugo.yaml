baseURL: "https://osousa.com/"
title: "Osvaldo Sousa"
paginate: 5
theme: PaperMod
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: "Osvaldo Sousa"
  description: "Cybersecurity analyst based in Maputo. Writing about infosec, networking, and things I find interesting."
  keywords: [cybersecurity, infosec, networking, blog, mozambique]
  author: "Osvaldo Sousa"
  defaultTheme: auto
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true

  mainSections:
    - posts

  profileMode:
    enabled: true
    title: "Osvaldo Sousa"
    subtitle: "Cybersecurity Analyst · SOC · Incident Response · Critical Infrastructure\nBased in Mozambique 🇲🇿"
    imageUrl: "img/profile.jpg"
    imageWidth: 240
    imageHeight: 240
    imageTitle: "Osvaldo Sousa"
    buttons:
      - name: About
        url: /about/
      - name: Blog
        url: /posts/

  socialIcons:
    - name: linkedin
      url: "https://www.linkedin.com/in/osvaldodesousa/"
    - name: github
      url: "https://github.com/TiPuco"
    - name: rss
      url: "/index.xml"

menu:
  main:
    - identifier: about
      name: About
      url: /about/
      weight: 10
    - identifier: blog
      name: Blog
      url: /posts/
      weight: 20
    - identifier: search
      name: Search
      url: /search/
      weight: 30
    - identifier: archives
      name: Archives
      url: /archives/
      weight: 40
    - identifier: contact
      name: Contact
      url: /contact/
      weight: 50

outputs:
  home:
    - HTML
    - RSS
    - JSON